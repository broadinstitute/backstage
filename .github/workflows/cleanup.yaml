---
name: Cleanup Dev Resources

"on":
  pull_request_target:
    types:
      - closed
permissions:
  contents: read
  pull-requests: read

jobs:
  cleanup:
    if: ${{ github.event.pull_request.merged == true }}
    name: Cleanup Dev Kubernetes Resources
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: development
    steps:
      - name: Set _REPONAME environment variable
        run: |
          echo "_REPONAME=${GITHUB_REPOSITORY#"broadinstitute/"}" >> $GITHUB_ENV
      - name: Checkout repo
        uses: actions/checkout@v7
      - name: Authenticate to Workload Identity
        uses: google-github-actions/auth@v3
        with:
          service_account: ${{ vars._SERVICE_ACCOUNT }}
          workload_identity_provider: ${{ vars._WORKLOAD_IDENTITY_PROVIDER }}
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          version: ">= 506.0.0"
      - id: get-credentials
        name: Get GKE Credentials
        uses: "google-github-actions/get-gke-credentials@v3"
        with:
          cluster_name: "gke-autopilot-01-prod"
          location: ${{ vars._LOCATION }}
          project_id: ${{ vars._GKE_PROJECT }}
      - id: scale-down-pods
        name: Scale Down Dev Deployment
        run: |
          kubectl scale deployment ${{ vars._APP }} -n ${{ vars._NAMESPACE }} --replicas=0
