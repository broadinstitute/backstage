[_]
schema-version = "0.2"
id = "org.broadinstitute.backstage"
name = "BITS Backstage"
authors = ["devnull@broadinstitute.org"]
version = "0.0.1"
source-url = "https://github.com/broadinstitute/backstage"
documentation-url = "https://backstage.broadinstitute.org/catalog/default/component/backstage/docs"

[types]
cache = true

[io.buildpacks]
builder = "gcr.io/buildpacks/builder@sha256:7755d0fdecdc0cae6419d4dee27969ce1a8c83cc06b5b86e867b5be1aa4d76ad"
exclude = [
    "github-app*",
    "app-config.local.yaml",
    "op.bash",
    "examples",
]

[[io.buildpacks.group]]
id = "google.nodejs.runtime"

[[io.buildpacks.group]]
id = "google.nodejs.yarn"

[[io.buildpacks.group]]
id = "google.config.entrypoint"

[[io.buildpacks.group]]
id = "google.utils.label-image"
